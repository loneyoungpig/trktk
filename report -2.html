<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>检验报告防伪查询</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #e8ecf1;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 10px 8px;
            min-height: 100vh;
            font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
        }
        .container {
            max-width: 520px;
            width: 100%;
            padding: 12px;
            position: relative;
            container-type: inline-size;
        }
        .container img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 4px;
        }

        .time-overlay {
            position: absolute;
            left: 50%;
            transform: translateX(calc(-50% + 47px)) translateY(1px);
            top: 12.5%;
            width: 88%;
            padding: 1px 6px 1px 12px;
            background: transparent;
            text-align: left;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 1px;
            pointer-events: none;
            color: #ffffff;
            font-weight: 400;
            text-shadow: none;
            opacity: 0.92;
            line-height: 1.6;
            /* 无模糊 */
        }

        /* 字体再缩小2px */
        .time-overlay .line1,
        .time-overlay .line2,
        .time-overlay .line3 {
            font-size: 1.5px;   /* 3.5 - 2 */
            letter-spacing: 0.2px;
        }
        .time-overlay .line2 {
            font-size: 1.0px;   /* 3.0 - 2 */
            letter-spacing: 0.1px;
        }
        .time-overlay .line3 {
            font-size: 0.8px;   /* 2.8 - 2 */
            letter-spacing: 0.1px;
        }
        .time-overlay .line3 a {
            color: #ffffff;
            text-decoration: none;
        }
        .time-overlay .count-value,
        .time-overlay .time-value {
            font-weight: 400;
        }

        .footer {
            text-align: center;
            font-size: 11px;
            color: #bbb;
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px solid #eee;
        }

        /* ===== 手机适配 ===== */
        @media screen and (max-width: 400px) {
            .time-overlay { padding-left: 8px; }
            .time-overlay .line1 { font-size: 0.1px; }   /* 0.5 - 2 -> 负值，取0.1 */
            .time-overlay .line2 { font-size: 0.1px; }   /* 0.2 - 2 -> 负值 */
            .time-overlay .line3 { font-size: 0.1px; }   /* 0.1 保持 */
        }
        @media screen and (min-width: 401px) and (max-width: 480px) {
            .time-overlay { padding-left: 10px; }
            .time-overlay .line1 { font-size: 0.1px; }   /* 1.0 - 2 -> 负值 */
            .time-overlay .line2 { font-size: 0.1px; }   /* 0.8 - 2 -> 负值 */
            .time-overlay .line3 { font-size: 0.1px; }   /* 0.5 - 2 -> 负值 */
        }
        @media screen and (min-width: 481px) and (max-width: 600px) {
            .time-overlay { padding-left: 11px; }
            .time-overlay .line1 { font-size: 0.1px; }   /* 2.0 - 2 = 0 */
            .time-overlay .line2 { font-size: 0.1px; }   /* 1.8 - 2 -> 负值 */
            .time-overlay .line3 { font-size: 0.1px; }   /* 1.5 - 2 -> 负值 */
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="te.png" alt="检验报告防伪查询">

        <div class="time-overlay" id="timeDisplay">
            <div class="line1">
                本报告第 <span class="count-value" id="viewCount">7</span> 次被查询 &nbsp; 本次查询时间：<span class="time-value" id="currentTime">--</span> &nbsp; 本次查询地址27.10.221.100(中国|重庆|重庆市|联通)
            </div>
            <div class="line3">
                <a href="#">www.trktk.com</a> - 汽油运输大气污染物检测报告防伪平台
            </div>
        </div>
    </div>

    <script>
        (function() {
            const REPORT_ID = 'QA-YQ-2026-0318';
            const COUNT_KEY = 'report_view_count_' + REPORT_ID;
            const LAST_TIME_KEY = 'report_last_time_' + REPORT_ID;

            function getNowStr() {
                const now = new Date();
                const pad = n => String(n).padStart(2, '0');
                return now.getFullYear() + '-' +
                       pad(now.getMonth() + 1) + '-' +
                       pad(now.getDate()) + ' ' +
                       pad(now.getHours()) + ':' +
                       pad(now.getMinutes()) + ':' +
                       pad(now.getSeconds());
            }

            let count = localStorage.getItem(COUNT_KEY);
            if (count === null) count = 0;
            else count = parseInt(count, 10);
            count = count + 1;
            localStorage.setItem(COUNT_KEY, String(count));

            const nowStr = getNowStr();
            localStorage.setItem(LAST_TIME_KEY, nowStr);

            document.getElementById('viewCount').textContent = count;
            document.getElementById('currentTime').textContent = nowStr;
        })();
    </script>
</body>
</html>
