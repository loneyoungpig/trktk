<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>检验报告防伪查询</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #e8ecf1;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 10px 8px;
            min-height: 100vh;
            font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
        }
        .container {
            max-width: 520px;
            width: 100%;
            padding: 12px;
            position: relative;
        }
        .container img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 4px;
        }

        /* ===== 覆盖层 - 无背景 ===== */
        .time-overlay {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            top: 12.5%;
            width: 88%;
            padding: 1px 6px;
            background: transparent;
            border-radius: 4px;
            text-align: center;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 2px 8px;
            flex-wrap: wrap;
            pointer-events: none;
            margin-top: -3px;
        }

        /* ===== 次数 ===== */
        .overlay-count {
            color: #ffffff !important;
            font-weight: 400;
            font-size: 5.5px;
            letter-spacing: 0.2px;
            text-shadow: none !important;
            filter: blur(0.3px);
            opacity: 0.92;
            transform: translate(-73.3px,2.2px);
        }
        .overlay-count .count-value {
            font-size: 8px;
            font-weight: 500;
            color: #ffffff !important;
            text-shadow: none !important;
            filter: blur(0.3px);
            opacity: 0.92;
        }

        /* ===== 时间 ===== */
        .overlay-time {
            color: #ffffff !important;
            font-weight: 400;
            font-size: 5.5px;
            letter-spacing: 0.2px;
            text-shadow: none !important;
            filter: blur(0.3px);
            opacity: 0.92;
            transform: translate(-12.5px, 2.2px);
        }
        .overlay-time .time-value {
            font-weight: 400;
            color: #ffffff !important;
            text-shadow: none !important;
            font-size: 7.5px;
            filter: blur(0.3px);
            opacity: 0.92;
        }

        .footer {
            text-align: center;
            font-size: 11px;
            color: #bbb;
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px solid #eee;
        }

        /* ============================================================ */
        /* ===== 手机屏幕适配 ===== */
        /* ============================================================ */

        @media screen and (max-width: 400px) {
            body {
                padding: 6px 4px;
            }
            .container {
                padding: 8px;
                border-radius: 8px;
            }
            .time-overlay {
                top: 12%;
                gap: 1px 4px;
                margin-top: -3px;
            }
            .overlay-count {
                font-size: 6px;
                transform: translate(-46px, 1.5px);
            }
            .overlay-count .count-value {
                font-size: 6.5px;
            }
            .overlay-time {
                font-size: 6px;
                transform: translate(-7px, 1.8px);
            }
            .overlay-time .time-value {
                font-size: 6px;
            }
            .footer {
                font-size: 9px;
                margin-top: 8px;
                padding-top: 6px;
            }
        }

        @media screen and (min-width: 401px) and (max-width: 480px) {
            .time-overlay {
                margin-top: -3px;
            }
            .overlay-count {
                transform: translate(-60px, 2px);
            }
            .overlay-time {
                transform: translate(-5px, 2.2px);
            }
        }

        @media screen and (min-width: 481px) and (max-width: 600px) {
            .time-overlay {
                margin-top: -3px;
            }
            .overlay-count {
                transform: translate(-70px, 2px);
            }
            .overlay-time {
                transform: translate(-3px, 2.3px);
            }
        }

        @media screen and (min-width: 601px) {
            .time-overlay {
                margin-top: -3px;
            }
            .overlay-count {
                transform: translate(-83.3px, 2.2px);
            }
            .overlay-time {
                transform: translate(-0.5px, 2.5px);
            }
        }

        @supports (padding: max(0px)) {
            body {
                padding-left: max(10px, env(safe-area-inset-left));
                padding-right: max(10px, env(safe-area-inset-right));
            }
        }

        @media (prefers-color-scheme: dark) {
            body {
                background: #d0d4da;
            }
            .container {
                background: #ffffff;
            }
        }
    </style>
</head>
<body>
    <div class="container">

        <img src="report.png" alt="检验报告防伪查询">

        <div class="time-overlay" id="timeDisplay">
            <span class="overlay-count"><span class="count-value" id="viewCount">7</span></span>
            <span class="overlay-time"><span class="time-value" id="currentTime">--</span></span>
        </div>
    </div>

    <script>
        (function() {
            const REPORT_ID = 'QA-YQ-2026-0318';
            const COUNT_KEY = 'report_view_count_' + REPORT_ID;
            const LAST_TIME_KEY = 'report_last_time_' + REPORT_ID;

            function getNowStr() {
                const now = new Date();
                const pad = n => String(n).padStart(2, '0');
                return now.getFullYear() + '-' +
                       pad(now.getMonth() + 1) + '-' +
                       pad(now.getDate()) + ' ' +
                       pad(now.getHours()) + ':' +
                       pad(now.getMinutes()) + ':' +
                       pad(now.getSeconds());
            }

            let count = localStorage.getItem(COUNT_KEY);
            if (count === null) {
                count = 0;
            } else {
                count = parseInt(count, 10);
            }
            count = count + 1;
            localStorage.setItem(COUNT_KEY, String(count));

            const nowStr = getNowStr();
            localStorage.setItem(LAST_TIME_KEY, nowStr);

            document.getElementById('viewCount').textContent = count;
            document.getElementById('currentTime').textContent = nowStr;
        })();
    </script>

</body>
</html>
