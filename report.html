<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 允许用户缩放，最大3倍 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3.0, user-scalable=yes">
    <title>检验报告防伪查询</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #e8ecf1;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 10px 8px;
            min-height: 100vh;
            font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
        }
        .container {
            max-width: 520px;
            width: 100%;
            padding: 12px;
            position: relative;
            /* 建立容器查询上下文 */
            container-type: inline-size;
        }
        .container img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 4px;
        }

        /* ===== 覆盖层 - 使用 cqi 单位（相对于容器宽度） ===== */
        .time-overlay {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            top: 14.8%;
            width: 70%;
            padding: 0.2% 1%;
            background: transparent;
            border-radius: 4px;
            text-align: center;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 2cqi 6cqi;
            flex-wrap: wrap;
            pointer-events: none;
            margin-top: 0px;
        }

        /* ===== 次数 ===== */
        .overlay-count {
            color: #ffffff !important;
            font-weight: 400;
            letter-spacing: 0.02cqi;
            text-shadow: none !important;
            filter: blur(0.3px);
            opacity: 0.92;
            transform: translate(-10.5cqi, 0.6%);
            font-size: 1.05cqi;
        }
        .overlay-count .count-value {
            font-weight: 500;
            color: #ffffff !important;
            text-shadow: none !important;
            filter: blur(0.3px);
            opacity: 0.92;
            font-size: 1.5cqi;
        }

        /* ===== 时间 ===== */
        .overlay-time {
            color: #ffffff !important;
            font-weight: 400;
            letter-spacing: 0.02cqi;
            text-shadow: none !important;
            filter: blur(0.3px);
            opacity: 0.92;
            transform: translate(0.5cqi, 0.4%);
            font-size: 1.05cqi;
        }
        .overlay-time .time-value {
            font-weight: 400;
            color: #ffffff !important;
            text-shadow: none !important;
            filter: blur(0.3px);
            opacity: 0.92;
            font-size: 1.45cqi;
        }

        .footer {
            text-align: center;
            font-size: 11px;
            color: #bbb;
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px solid #eee;
        }

        /* ===== 限制最大最小值 ===== */
        @media screen and (max-width: 320px) {
            .overlay-count {
                font-size: 3.2px;
                transform: translate(-9cqi, 0.6%);
            }
            .overlay-count .count-value {
                font-size: 4.8px;
            }
            .overlay-time {
                font-size: 3.2px;
                transform: translate(1cqi, 0.4%);
            }
            .overlay-time .time-value {
                font-size: 4.5px;
            }
        }

        @media screen and (min-width: 600px) {
            .overlay-count {
                font-size: 6.5px;
                transform: translate(-63px, 0.6%);
            }
            .overlay-count .count-value {
                font-size: 9.5px;
            }
            .overlay-time {
                font-size: 6.5px;
                transform: translate(3px, 0.4%);
            }
            .overlay-time .time-value {
                font-size: 9px;
            }
        }

        @supports (padding: max(0px)) {
            body {
                padding-left: max(10px, env(safe-area-inset-left));
                padding-right: max(10px, env(safe-area-inset-right));
            }
        }

        @media (prefers-color-scheme: dark) {
            body {
                background: #d0d4da;
            }
            .container {
                background: #ffffff;
            }
        }
    </style>
</head>
<body>
    <div class="container">

        <img src="report.png" alt="检验报告防伪查询">

        <div class="time-overlay" id="timeDisplay">
            <span class="overlay-count"><span class="count-value" id="viewCount">7</span></span>
            <span class="overlay-time"><span class="time-value" id="currentTime">--</span></span>
        </div>
    </div>

    <script>
        (function() {
            const REPORT_ID = 'QA-YQ-2026-0318';
            const COUNT_KEY = 'report_view_count_' + REPORT_ID;
            const LAST_TIME_KEY = 'report_last_time_' + REPORT_ID;

            function getNowStr() {
                const now = new Date();
                const pad = n => String(n).padStart(2, '0');
                return now.getFullYear() + '-' +
                       pad(now.getMonth() + 1) + '-' +
                       pad(now.getDate()) + ' ' +
                       pad(now.getHours()) + ':' +
                       pad(now.getMinutes()) + ':' +
                       pad(now.getSeconds());
            }

            let count = localStorage.getItem(COUNT_KEY);
            if (count === null) {
                count = 0;
            } else {
                count = parseInt(count, 10);
            }
            count = count + 1;
            localStorage.setItem(COUNT_KEY, String(count));

            const nowStr = getNowStr();
            localStorage.setItem(LAST_TIME_KEY, nowStr);

            document.getElementById('viewCount').textContent = count;
            document.getElementById('currentTime').textContent = nowStr;
        })();
    </script>

</body>
</html>
