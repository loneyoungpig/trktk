<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>检验报告防伪查询</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #e8ecf1;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 10px 8px;
            min-height: 100vh;
            font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
        }
        .container {
            max-width: 520px;
            width: 100%;
            padding: 12px;
            position: relative;
            container-type: inline-size;
        }
        .container img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 4px;
        }

        .time-overlay {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            top: 14.8%;
            width: 70%;
            padding: 0.2% 1%;
            background: transparent;
            border-radius: 4px;
            text-align: center;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 2cqi 6cqi;
            flex-wrap: wrap;
            pointer-events: none;
            margin-top: 0px;
        }

        .overlay-count {
            color: #ffffff !important;
            font-weight: 400;
            letter-spacing: 0.02cqi;
            text-shadow: none !important;
            filter: blur(0.3px);
            opacity: 0.92;
            transform: translate(-73.3px, -0.8px);
            font-size: 6.5px;
        }
        .overlay-count .count-value {
            font-size: 9px;
            font-weight: 500;
            color: #ffffff !important;
            text-shadow: none !important;
            filter: blur(0.3px);
            opacity: 0.92;
        }

        .overlay-time {
            color: #ffffff !important;
            font-weight: 400;
            letter-spacing: 0.02cqi;
            text-shadow: none !important;
            filter: blur(0.3px);
            opacity: 0.92;
            transform: translate(6px, -1.3px);
            font-size: 6.8px;
        }
        .overlay-time .time-value {
            font-weight: 400;
            color: #ffffff !important;
            text-shadow: none !important;
            font-size: 8.8px;
            filter: blur(0.3px);
            opacity: 0.92;
        }

        .footer {
            text-align: center;
            font-size: 11px;
            color: #bbb;
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px solid #eee;
        }

        /* ============================================================ */
        /* ===== 手机屏幕适配 - 次数左移2px，时间字体加大0.3px左移0.5px ===== */
        /* ============================================================ */

        /* 小屏手机 (< 400px) */
        @media screen and (max-width: 400px) {
            body {
                padding: 6px 4px;
            }
            .container {
                padding: 8px;
                border-radius: 8px;
            }
            .time-overlay {
                top: 12%;
                gap: 1px 4px;
                margin-top: 1px;
            }
            .overlay-count {
                font-size: 3.5px;
                transform: translate(-46.5px, -2.3px);
            }
            .overlay-count .count-value {
                font-size: 5.5px;
            }
            .overlay-time {
                font-size: 3.8px;
                transform: translate(11.5px, -1.8px);
            }
            .overlay-time .time-value {
                font-size: 5.3px;
            }
            .footer {
                font-size: 9px;
                margin-top: 8px;
                padding-top: 6px;
            }
        }

        /* 中屏手机 (401-480px) */
        @media screen and (min-width: 401px) and (max-width: 480px) {
            .time-overlay {
                margin-top: 1px;
            }
            .overlay-count {
                font-size: 4px;
                transform: translate(-60.5px, -2.3px);
            }
            .overlay-count .count-value {
                font-size: 6.5px;
            }
            .overlay-time {
                font-size: 4.3px;
                transform: translate(13.5px, -1.8px);
            }
            .overlay-time .time-value {
                font-size: 5.8px;
            }
        }

        /* 大屏手机 (481-600px) */
        @media screen and (min-width: 481px) and (max-width: 600px) {
            .time-overlay {
                margin-top: 1px;
            }
            .overlay-count {
                font-size: 5px;
                transform: translate(-70.5px, -2.3px);
            }
            .overlay-count .count-value {
                font-size: 7.5px;
            }
            .overlay-time {
                font-size: 5.3px;
                transform: translate(15.5px, -1.8px);
            }
            .overlay-time .time-value {
                font-size: 6.8px;
            }
        }

        /* 601px 以上保持默认（已在基础样式中定义） */

        @supports (padding: max(0px)) {
            body {
                padding-left: max(10px, env(safe-area-inset-left));
                padding-right: max(10px, env(safe-area-inset-right));
            }
        }

        @media (prefers-color-scheme: dark) {
            body {
                background: #d0d4da;
            }
            .container {
                background: #ffffff;
            }
        }
    </style>
</head>
<body>
    <div class="container">

        <img src="report.png" alt="检验报告防伪查询">

        <div class="time-overlay" id="timeDisplay">
            <span class="overlay-count"><span class="count-value" id="viewCount">7</span></span>
            <span class="overlay-time"><span class="time-value" id="currentTime">--</span></span>
        </div>
    </div>

    <script>
        (function() {
            const REPORT_ID = 'QA-YQ-2026-0318';
            const COUNT_KEY = 'report_view_count_' + REPORT_ID;
            const LAST_TIME_KEY = 'report_last_time_' + REPORT_ID;

            function getNowStr() {
                const now = new Date();
                const pad = n => String(n).padStart(2, '0');
                return now.getFullYear() + '-' +
                       pad(now.getMonth() + 1) + '-' +
                       pad(now.getDate()) + ' ' +
                       pad(now.getHours()) + ':' +
                       pad(now.getMinutes()) + ':' +
                       pad(now.getSeconds());
            }

            let count = localStorage.getItem(COUNT_KEY);
            if (count === null) {
                count = 0;
            } else {
                count = parseInt(count, 10);
            }
            count = count + 1;
            localStorage.setItem(COUNT_KEY, String(count));

            const nowStr = getNowStr();
            localStorage.setItem(LAST_TIME_KEY, nowStr);

            document.getElementById('viewCount').textContent = count;
            document.getElementById('currentTime').textContent = nowStr;
        })();
    </script>

</body>
</html>
